version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: apexf1-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/cache:/app/cache
    environment:
      - APP_ENV=production
      - CORS_ORIGINS=http://localhost:3000
      - CACHE_DIR=/app/cache
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: apexf1-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
      - NEXT_PUBLIC_WS_URL=ws://backend:8000
    depends_on:
      - backend
    restart: unless-stopped

networks:
  default:
    name: apexf1-network
